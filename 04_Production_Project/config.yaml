app:
  name: "Production API"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: ""
  name: "mydb"
  driver: "postgres"
  max_open_connections: 25
  max_idle_connections: 5
  max_lifetime: 5m

jwt:
  secret: "super-secret"
  access_expiry: 15m
  refresh_expiry: 24h

logger:
  level: "info"
  format: "json"